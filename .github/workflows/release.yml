name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-beta*'
      - '[0-9]+.[0-9]+.[0-9]+-rc*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true
      - name: Compare tag name with version string.
        run: |
          # Get the triggered tag name
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Extract version from __init__.py
          VERSION=$(grep -oP "(?<=__version__ = \")[^\"]+" src/cracknuts/__init__.py)
          # Compare tag name with version
          if [[ "$TAG_NAME" != "$VERSION" ]]; then
            echo "Error: Tag name '$TAG_NAME' does not match the version '$VERSION' in __init__.py"
            exit 1
          else
            echo "Tag name '$TAG_NAME' matches the version '$VERSION'."
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: './jupyter_frontend/.node-version'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install jupyter frontend dependencies
        run: |
          cd jupyter_frontend
          pnpm install
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Build jupyter frontend
        run: |
          cd jupyter_frontend
          pnpm run clean-build
      - name: Build the package
        run: |
          uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/*

  upload-to-github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: CHANGES.md
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          body_path: CHANGES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  upload-to-pypi:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist
      - uses: astral-sh/setup-uv@v5
      - name: Upload to pypi
        env:
          UV_PUBLISH_TOKEN: ${{secrets.PYPI_TOKEN}}
        run: |
          uv publish
